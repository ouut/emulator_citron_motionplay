name: Build Citron

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install \
            ninja cmake pkg-config \
            boost catch2 enet fmt \
            lz4 zstd openssl@3 libusb opus \
            nlohmann-json sdl2 openal-soft \
            molten-vk vulkan-headers vulkan-loader \
            glslang hidapi libvpx lld llvm nasm \
            python@3.12 ffmpeg@7 webp

      - name: Patch Qt AGL
        run: |
          FILE="externals/qt/qtbase/cmake/FindWrapOpenGL.cmake"
          if [ -f "$FILE" ]; then
            echo "Patching AGL framework path..."
            # Replace the AGL framework line with empty path
            sed -i '' '40,46s/.*__opengl_agl_fw_path.*/    set(__opengl_agl_fw_path "")/' "$FILE"
            echo "Patched successfully"
            grep -n "agl" "$FILE" || echo "No AGL references after patch"
          else
            echo "AGL patch file not found at $FILE, checking location..."
            find externals -name "FindWrapOpenGL.cmake" 2>/dev/null || echo "File not in externals"
          fi

      - name: Set up Python
        run: |
          python3.12 -m venv venv
          source venv/bin/activate
          pip install jsonschema jinja2

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DENABLE_QT=ON \
            -DENABLE_SDL2=ON \
            -DCITRON_USE_EXTERNAL_SDL2=OFF \
            -DENABLE_WEB_SERVICE=OFF \
            -DCITRON_ENABLE_LTO=OFF \
            -DCITRON_USE_BUNDLED_VCPKG=OFF \
            -DCITRON_USE_BUNDLED_FFMPEG=OFF \
            -DUSE_DISCORD_PRESENCE=OFF \
            -DCITRON_TESTS=OFF \
            -DENABLE_OPENSSL=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          set -e
          APP=$(find build -name "citron.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: citron.app not found!"
            find build -name "citron*" -type f 2>/dev/null | head -20
            find build -name "*.app" 2>/dev/null | head -10
            exit 1
          fi

          mkdir -p dist
          cp -r "$APP" dist/
          APP="dist/citron.app"

          # macdeployqt
          QTDIR=$(brew --prefix qt@6 2>/dev/null || echo /usr/local/opt/qt@6)
          if [ -f "$QTDIR/bin/macdeployqt" ]; then
            echo "Running macdeployqt..."
            $QTDIR/bin/macdeployqt "$APP" -verbose=1 || true
          fi

          # MoltenVK ICD
          MOLTENVK_DIR=$(brew --prefix molten-vk 2>/dev/null || echo /usr/local/opt/molten-vk)
          mkdir -p "$APP/Contents/Frameworks"
          if [ -f "$MOLTENVK_DIR/lib/libMoltenVK.dylib" ]; then
            cp "$MOLTENVK_DIR/lib/libMoltenVK.dylib" "$APP/Contents/Frameworks/"
          fi

          # Copy missing dylibs (from citron-neo/CI approach, iterative)
          copy_missing_deps() {
            for lib in $(find "$APP" \( -name "citron" -o -name "*.dylib" \)); do
              for dep in $(otool -L "$lib" 2>/dev/null | awk '/^\t\// && /(Homebrew|usr\/local)/ {print $1}'); do
                depname=$(basename "$dep")
                dest="$APP/Contents/Frameworks/$depname"
                if [ ! -f "$dest" ]; then
                  echo "  copying $depname"
                  cp "$dep" "$dest" 2>/dev/null || true
                  chmod u+w "$dest" 2>/dev/null || true
                fi
              done
            done
          }

          for i in $(seq 1 5); do
            echo "Dependency pass $i..."
            copy_missing_deps
          done

          # Fix rpaths
          for lib in $(find "$APP/Contents/Frameworks" -name "*.dylib" 2>/dev/null); do
            install_name_tool -add_rpath "@loader_path/" "$lib" 2>/dev/null || true
          done
          install_name_tool -add_rpath "@executable_path/../Frameworks" "$APP/Contents/MacOS/citron" 2>/dev/null || true

          # Ad-hoc codesign
          codesign --force --deep -s - "$APP" 2>/dev/null || true

          # DMG
          VERSION=$(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)
          DMG="dist/Citron-macOS-${VERSION}.dmg"
          hdiutil create -volname "Citron" -srcfolder "$APP" -ov -format UDZO "$DMG"
          echo "DMG ready: $(ls -lh "$DMG")"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Citron-macOS
          path: dist/*.dmg
          if-no-files-found: error
